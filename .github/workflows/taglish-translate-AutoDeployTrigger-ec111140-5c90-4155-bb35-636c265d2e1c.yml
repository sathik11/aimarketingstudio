name: Trigger auto deployment for taglish-translate

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/taglish-translate-AutoDeployTrigger-ec111140-5c90-4155-bb35-636c265d2e1c.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.TAGLISHTRANSLATE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TAGLISHTRANSLATE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.TAGLISHTRANSLATE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          registryUrl: 
          containerAppName: taglish-translate
          resourceGroup: sb-exp-austeast
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_

      - name: Enable system managed identity on Container App
        run: |
          az containerapp identity assign \
            --name taglish-translate \
            --resource-group sb-exp-austeast \
            --system-assigned

      - name: Configure registry auth with managed identity
        run: |
          principal_id=$(az containerapp identity show \
            --name taglish-translate \
            --resource-group sb-exp-austeast \
            --query principalId -o tsv)

          acr_id=$(az acr show --name taglishtranslate --resource-group sb-exp-austeast --query id -o tsv)
          az role assignment create --assignee-object-id "$principal_id" --assignee-principal-type ServicePrincipal --role AcrPull --scope "$acr_id" || true

          identity_resource_id=$(az containerapp identity show \
            --name taglish-translate \
            --resource-group sb-exp-austeast \
            --query id -o tsv)

          az containerapp registry set \
            --name taglish-translate \
            --resource-group sb-exp-austeast \
            --server taglishtranslate.azurecr.io \
            --identity "$identity_resource_id"


